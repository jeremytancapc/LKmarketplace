<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Marketplace Simulator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- SVG Icon Components (Replaces lucide-react) ---
        const Icon = ({ children, className = "", size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>;
        const Users = (p) => <Icon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></Icon>;
        const TrendingUp = (p) => <Icon {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></Icon>;
        const Filter = (p) => <Icon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></Icon>;
        const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><path d="M9 12l2 2 4-4"></path></Icon>;
        const ArrowRight = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></Icon>;

        // --- Main Application ---
        function App() {
          // General / Lender A
          const [adSpend, setAdSpend] = useState(3000);
          const [cpl, setCpl] = useState(40);
          const [baseFee, setBaseFee] = useState(1000);
          const [lenderAPerfFee, setLenderAPerfFee] = useState(0);
          const [lenderAConvRate, setLenderAConvRate] = useState(15);
          
          // Market Split
          const [duplicatePercent, setDuplicatePercent] = useState(25);
          
          // Lender B
          const [lenderBColdLeadFee, setLenderBColdLeadFee] = useState(0);
          const [lenderBPerfFee, setLenderBPerfFee] = useState(100);
          const [lenderBConvRate, setLenderBConvRate] = useState(15);
          const [refundToA, setRefundToA] = useState(20);
          
          // Lender C
          const [lenderCFee, setLenderCFee] = useState(5);
          
          // Business Overheads
          const [techCost, setTechCost] = useState(0);
          const [manpowerCost, setManpowerCost] = useState(0);
          const [rentalCost, setRentalCost] = useState(0);

          // --- CALCULATIONS ---
          const data = useMemo(() => {
            // Lead Counts
            const totalLeads = adSpend / cpl;
            const aUsableLeads = totalLeads * ((100 - duplicatePercent) / 100);
            const aPerformingLeads = aUsableLeads * (lenderAConvRate / 100);
            
            const bReceivedLeads = totalLeads * (duplicatePercent / 100);
            const bPerformingLeads = bReceivedLeads * (lenderBConvRate / 100);
            
            const cReceivedLeads = bReceivedLeads - bPerformingLeads;
            
            // Revenues
            const revABase = baseFee;
            const revAPerf = aPerformingLeads * lenderAPerfFee;
            const revBCold = bReceivedLeads * lenderBColdLeadFee;
            const revBPerf = bPerformingLeads * lenderBPerfFee;
            const revB = revBCold + revBPerf;
            const totalRefundToA = bPerformingLeads * refundToA;
            const revC = cReceivedLeads * lenderCFee;

            // Lender A Economics 
            const lenderAGrossCost = adSpend + baseFee + revAPerf;
            const lenderANetCost = lenderAGrossCost - totalRefundToA;
            const lenderAActualCPL = aUsableLeads > 0 ? lenderANetCost / aUsableLeads : 0;
            const lenderAActualCPSU = aPerformingLeads > 0 ? lenderANetCost / aPerformingLeads : 0;
            
            const operatingCosts = techCost + manpowerCost + rentalCost;
            const totalGrossRevenue = revABase + revAPerf + revB - totalRefundToA + revC;
            const netProfit = totalGrossRevenue - operatingCosts;
            const revPerDollar = totalGrossRevenue / adSpend;
            
            return {
              totalLeads, aUsableLeads, aPerformingLeads, bReceivedLeads, bPerformingLeads, cReceivedLeads,
              revABase, revAPerf, revBCold, revBPerf, revB, totalRefundToA, revC, totalGrossRevenue, netProfit, revPerDollar, operatingCosts,
              lenderAGrossCost, lenderANetCost, lenderAActualCPL, lenderAActualCPSU
            };
          }, [adSpend, cpl, baseFee, lenderAPerfFee, lenderAConvRate, duplicatePercent, lenderBColdLeadFee, lenderBPerfFee, lenderBConvRate, refundToA, lenderCFee, techCost, manpowerCost, rentalCost]);

          // Formatters
          const formatCur = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
          const formatNum = (num) => new Intl.NumberFormat('en-US', { maximumFractionDigits: 1 }).format(num);

          // Profitability Analysis Logic
          const generateInsights = () => {
            const insights = [];
            if (data.netProfit < 0) {
              insights.push({ type: 'danger', text: `You are currently losing ${formatCur(Math.abs(data.netProfit))} per month. You must increase volume, raise fees, or improve conversions to cover your ${formatCur(data.operatingCosts)} overhead.` });
              
              const variableRevPerLead = ((100-duplicatePercent)/100 * (lenderAConvRate/100) * lenderAPerfFee) + 
                                         ((duplicatePercent/100) * lenderBColdLeadFee) +
                                         ((duplicatePercent/100) * (lenderBConvRate/100) * (lenderBPerfFee - refundToA)) +
                                         ((duplicatePercent/100) * (1 - lenderBConvRate/100) * lenderCFee);
              const leadsNeededToBreakEven = (data.operatingCosts - baseFee) / variableRevPerLead;
              const adSpendNeeded = leadsNeededToBreakEven * cpl;
              
              if (adSpendNeeded > adSpend && adSpendNeeded > 0 && isFinite(adSpendNeeded)) {
                insights.push({ type: 'action', text: `Action: Increase Lender A's Ad Spend to approximately ${formatCur(adSpendNeeded)} to break even with current conversion rates.` });
              } else {
                insights.push({ type: 'action', text: `Action: Your base fee and overheads are misaligned. Either increase your $${baseFee} base fee or reduce overheads.` });
              }
            } else {
              insights.push({ type: 'success', text: `You are profitable! Net profit is ${formatCur(data.netProfit)}/mo after operating costs.` });
              if (data.revPerDollar < 0.5) {
                insights.push({ type: 'warning', text: `Efficiency warning: You make only ${formatCur(data.revPerDollar)} per $1 spent. To scale effectively, try negotiating a lower Cost Per Lead (CPL) below ${formatCur(cpl)}.` });
              }
              if (lenderBConvRate < 20) {
                insights.push({ type: 'action', text: `Growth Opportunity: Lender B leads have high margins. Focus on increasing Lender B's conversion rate above ${lenderBConvRate}%. Every extra performing B lead nets you ${formatCur(lenderBPerfFee - refundToA)}.` });
              }
            }
            return insights;
          };

          const InputSlider = ({ label, value, setter, min, max, step = 1, symbol = '', isCurrency = false }) => (
            <div className="mb-4">
              <div className="flex justify-between mb-1">
                <label className="text-sm font-medium text-slate-700">{label}</label>
                <span className="text-sm font-bold text-indigo-600">
                  {isCurrency ? formatCur(value) : `${value}${symbol}`}
                </span>
              </div>
              <input
                type="range"
                min={min}
                max={max}
                step={step}
                value={value}
                onChange={(e) => setter(parseFloat(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
              />
            </div>
          );

          return (
            <div className="min-h-screen p-4 md:p-8">
              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* Header */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center">
                  <div>
                    <h1 className="text-2xl md:text-3xl font-bold text-slate-900 flex items-center gap-2">
                      <Activity className="text-indigo-600" />
                      Loan Marketplace Simulator
                    </h1>
                    <p className="text-slate-500 mt-1">Adjust the variables below to simulate revenue streams and profitability.</p>
                  </div>
                  <div className="mt-4 md:mt-0 text-right">
                    <div className="text-sm text-slate-500 uppercase font-semibold tracking-wider">Net Profit / Mo</div>
                    <div className={`text-3xl font-black ${data.netProfit >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                      {formatCur(data.netProfit)}
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  
                  {/* LEFT COLUMN: Controls */}
                  <div className="lg:col-span-4 space-y-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800"><Settings size={20}/> Global & Lender A</h2>
                      
                      {/* SUMMARY BOX: Lender A Economics */}
                      <div className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div className="text-sm font-semibold text-slate-800 mb-3 flex justify-between items-center">
                          <span>Lender A Economics</span>
                          <span className="text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded text-xs font-bold">Net Costs</span>
                        </div>
                        <div className="space-y-2">
                          <div className="flex justify-between items-center text-sm">
                            <span className="text-slate-500">Gross Cost <span className="text-xs text-slate-400">(Ad+Base+Perf)</span></span>
                            <span className="font-bold text-slate-900">{formatCur(data.lenderAGrossCost)}</span>
                          </div>
                          <div className="flex justify-between items-center text-sm">
                            <span className="text-emerald-600">Refunds ({formatNum(data.bPerformingLeads)} customers)</span>
                            <span className="font-bold text-emerald-600">-{formatCur(data.totalRefundToA)}</span>
                          </div>
                          <div className="flex justify-between items-center text-sm pt-2 border-t border-slate-200">
                            <span className="text-slate-600 font-medium">Net Cost</span>
                            <span className="font-bold text-slate-900">{formatCur(data.lenderANetCost)}</span>
                          </div>
                          <div className="flex justify-between items-center text-sm pt-2">
                            <span className="text-slate-500">Actual CPL <span className="text-xs text-slate-400">(per usable lead)</span></span>
                            <span className="font-bold text-slate-900">{formatCur(data.lenderAActualCPL)}</span>
                          </div>
                          <div className="flex justify-between items-center text-sm pt-2 border-t border-slate-200">
                            <span className="text-slate-600 font-medium">Cost per Sign Up <span className="text-xs text-slate-400 font-normal">(Net)</span></span>
                            <span className="font-bold text-indigo-600">{formatCur(data.lenderAActualCPSU)}</span>
                          </div>
                        </div>
                      </div>

                      <InputSlider label="Lender A Ad Spend" value={adSpend} setter={setAdSpend} min={1000} max={100000} step={1000} isCurrency />
                      <InputSlider label="Cost Per Lead (CPL)" value={cpl} setter={setCpl} min={10} max={100} step={5} isCurrency />
                      <InputSlider label="Base Fee to A" value={baseFee} setter={setBaseFee} min={0} max={16000} step={100} isCurrency />
                      <InputSlider label="Lender A Perf. Fee" value={lenderAPerfFee} setter={setLenderAPerfFee} min={0} max={200} step={5} isCurrency />
                      <InputSlider label="Lender A Conv. Rate" value={lenderAConvRate} setter={setLenderAConvRate} min={1} max={50} symbol="%" />
                      <InputSlider label="Refund to A per B Conv." value={refundToA} setter={setRefundToA} min={0} max={100} step={5} isCurrency />
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800"><Users size={20}/> Sub-Market (B & C)</h2>
                      
                      {/* SUMMARY BOX: Sub-Market Overview */}
                      <div className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div className="text-sm font-semibold text-slate-800 mb-3 flex justify-between items-center">
                          <span>Sub-Market Overview</span>
                          <span className="text-purple-600 bg-purple-100 px-2 py-0.5 rounded text-xs font-bold">B & C Stats</span>
                        </div>
                        <div className="space-y-2">
                          <div className="flex justify-between items-center text-sm">
                            <span className="text-slate-500">Lender B Leads <span className="text-xs text-slate-400">(Duplicates)</span></span>
                            <span className="font-bold text-slate-900">{formatNum(data.bReceivedLeads)}</span>
                          </div>
                          <div className="flex justify-between items-center text-sm">
                            <span className="text-slate-500">Lender B Pays <span className="text-xs text-slate-400">(Revenue)</span></span>
                            <span className="font-bold text-purple-600">{formatCur(data.revB)}</span>
                          </div>
                          <div className="flex justify-between items-center text-sm pt-2 border-t border-slate-200">
                            <span className="text-slate-500">Lender C Leads <span className="text-xs text-slate-400">(Unconverted B)</span></span>
                            <span className="font-bold text-slate-900">{formatNum(data.cReceivedLeads)}</span>
                          </div>
                          <div className="flex justify-between items-center text-sm">
                            <span className="text-slate-500">Lender C Pays <span className="text-xs text-slate-400">(Revenue)</span></span>
                            <span className="font-bold text-orange-600">{formatCur(data.revC)}</span>
                          </div>
                        </div>
                      </div>

                      <InputSlider label="Duplicate Leads (Goes to B)" value={duplicatePercent} setter={setDuplicatePercent} min={0} max={100} symbol="%" />
                      <InputSlider label="Lender B Cold Lead Price" value={lenderBColdLeadFee} setter={setLenderBColdLeadFee} min={0} max={200} step={5} isCurrency />
                      <InputSlider label="Lender B Perf. Fee" value={lenderBPerfFee} setter={setLenderBPerfFee} min={10} max={200} step={10} isCurrency />
                      <InputSlider label="Lender B Conv. Rate" value={lenderBConvRate} setter={setLenderBConvRate} min={1} max={50} symbol="%" />
                      <InputSlider label="Lender C Cold Lead Price" value={lenderCFee} setter={setLenderCFee} min={0} max={30} step={1} isCurrency />
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800"><TrendingUp size={20}/> Business Ops</h2>
                      <div className="mb-4 text-sm font-semibold text-slate-600 flex justify-between border-b pb-2 border-slate-100">
                        <span>Total Overhead:</span>
                        <span className="text-rose-600">{formatCur(data.operatingCosts)}</span>
                      </div>
                      <InputSlider label="Tech / Software" value={techCost} setter={setTechCost} min={0} max={5000} step={50} isCurrency />
                      <InputSlider label="Manpower" value={manpowerCost} setter={setManpowerCost} min={0} max={20000} step={100} isCurrency />
                      <InputSlider label="Rental / Admin" value={rentalCost} setter={setRentalCost} min={0} max={10000} step={100} isCurrency />
                    </div>
                  </div>

                  {/* RIGHT COLUMN: Dashboards & Insights */}
                  <div className="lg:col-span-8 space-y-6">
                    
                    {/* KPI Row */}
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div className="text-sm text-slate-500 font-medium mb-1">Gross Revenue</div>
                        <div className="text-2xl font-bold text-slate-900">{formatCur(data.totalGrossRevenue)}</div>
                      </div>
                      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div className="text-sm text-slate-500 font-medium mb-1">Total Raw Leads</div>
                        <div className="text-2xl font-bold text-slate-900">{formatNum(data.totalLeads)}</div>
                      </div>
                      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div className="text-sm text-slate-500 font-medium mb-1">Rev per $1 Ad Spend</div>
                        <div className="text-2xl font-bold text-indigo-600">{formatCur(data.revPerDollar)}</div>
                      </div>
                    </div>

                    {/* Lead Flow Funnel */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h3 className="text-lg font-bold mb-6 border-b pb-2 flex items-center gap-2 text-slate-800">
                        <Filter size={20} className="text-indigo-600"/> Lead Flow Funnel
                      </h3>
                      
                      <div className="flex flex-col items-center">
                        {/* Top */}
                        <div className="bg-slate-800 text-white px-6 py-4 rounded-xl text-center w-full max-w-sm shadow-md">
                          <div className="text-sm text-slate-300 uppercase tracking-wider font-semibold mb-1">Total Raw Leads Bought</div>
                          <div className="text-3xl font-black">{formatNum(data.totalLeads)}</div>
                        </div>
                        
                        {/* Split Arrows */}
                        <div className="flex w-full max-w-[24rem] justify-between h-8 relative">
                          <div className="absolute top-0 left-1/4 w-[2px] h-full bg-slate-300"></div>
                          <div className="absolute top-0 right-1/4 w-[2px] h-full bg-slate-300"></div>
                          <div className="absolute top-0 left-1/4 right-1/4 h-[2px] bg-slate-300"></div>
                        </div>

                        {/* Level 2: Sent to A & B */}
                        <div className="flex w-full gap-4 sm:gap-8 justify-center">
                          
                          {/* A Branch */}
                          <div className="w-1/2 max-w-[200px] flex flex-col items-center">
                            <div className="bg-blue-50 border border-blue-200 text-blue-900 px-4 py-3 rounded-xl text-center w-full shadow-sm">
                              <div className="text-[10px] sm:text-xs font-bold uppercase tracking-wider text-blue-600 mb-1">Lender A Stream</div>
                              <div className="text-xs text-slate-500">Sent (Usable)</div>
                              <div className="text-xl sm:text-2xl font-bold">{formatNum(data.aUsableLeads)}</div>
                            </div>
                            <div className="h-6 w-[2px] bg-blue-200 my-1"></div>
                            <div className="bg-blue-500 text-white px-4 py-3 rounded-xl text-center w-full shadow-sm">
                              <div className="text-xs text-blue-100">Converted (Perf.)</div>
                              <div className="text-xl sm:text-2xl font-bold">{formatNum(data.aPerformingLeads)}</div>
                            </div>
                          </div>

                          {/* B Branch */}
                          <div className="w-1/2 max-w-[200px] flex flex-col items-center">
                            <div className="bg-purple-50 border border-purple-200 text-purple-900 px-4 py-3 rounded-xl text-center w-full shadow-sm">
                              <div className="text-[10px] sm:text-xs font-bold uppercase tracking-wider text-purple-600 mb-1">Lender B Stream</div>
                              <div className="text-xs text-slate-500">Sent (Duplicates)</div>
                              <div className="text-xl sm:text-2xl font-bold">{formatNum(data.bReceivedLeads)}</div>
                            </div>
                            <div className="h-6 w-[2px] bg-purple-200 my-1 relative"></div>
                            <div className="bg-purple-500 text-white px-4 py-3 rounded-xl text-center w-full shadow-sm">
                              <div className="text-xs text-purple-100">Converted (Perf.)</div>
                              <div className="text-xl sm:text-2xl font-bold">{formatNum(data.bPerformingLeads)}</div>
                            </div>
                            
                            {/* C Branch extends from B */}
                            <div className="h-8 w-[2px] bg-slate-300 my-1 relative">
                              <span className="absolute left-3 text-[10px] text-slate-500 whitespace-nowrap top-2 bg-slate-50 px-1 rounded">Unconverted</span>
                            </div>
                            <div className="bg-orange-50 border border-orange-200 text-orange-900 px-4 py-3 rounded-xl text-center w-full shadow-sm">
                              <div className="text-[10px] sm:text-xs font-bold uppercase tracking-wider text-orange-600 mb-1">Lender C Stream</div>
                              <div className="text-xs text-slate-500">Sent (Cold)</div>
                              <div className="text-xl sm:text-2xl font-bold">{formatNum(data.cReceivedLeads)}</div>
                            </div>
                          </div>

                        </div>
                      </div>
                    </div>

                    {/* Profitability Insights */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h3 className="text-lg font-bold mb-4 border-b pb-2">Profitability & Actions</h3>
                      <div className="space-y-3">
                        {generateInsights().map((insight, idx) => (
                          <div key={idx} className={`p-4 rounded-xl flex gap-3 items-start ${
                            insight.type === 'danger' ? 'bg-rose-50 text-rose-800' :
                            insight.type === 'success' ? 'bg-emerald-50 text-emerald-800' :
                            insight.type === 'warning' ? 'bg-amber-50 text-amber-800' :
                            'bg-indigo-50 text-indigo-800'
                          }`}>
                            {insight.type === 'danger' && <AlertCircle className="w-5 h-5 flex-shrink-0 mt-0.5" />}
                            {insight.type === 'success' && <CheckCircle2 className="w-5 h-5 flex-shrink-0 mt-0.5" />}
                            {insight.type === 'warning' && <AlertCircle className="w-5 h-5 flex-shrink-0 mt-0.5" />}
                            {insight.type === 'action' && <ArrowRight className="w-5 h-5 flex-shrink-0 mt-0.5" />}
                            <span className="text-sm font-medium">{insight.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Pipeline Visualization */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h3 className="text-lg font-bold mb-6 border-b pb-2">Revenue Pipeline Breakdown</h3>
                      
                      {/* Lender A */}
                      <div className="mb-6">
                        <div className="flex justify-between items-end mb-2">
                          <h4 className="font-bold text-slate-700 flex items-center gap-2">
                            <div className="w-3 h-3 rounded-full bg-blue-500"></div> Lender A Stream
                          </h4>
                          <div className="text-right text-sm">
                            Net: <span className="font-bold text-emerald-600">{formatCur(data.revABase + data.revAPerf - data.totalRefundToA)}</span>
                          </div>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                          <div className="bg-slate-50 p-2 rounded border border-slate-100">
                            <span className="text-slate-500 block">Received Leads</span>
                            <span className="font-bold text-sm">{formatNum(data.bReceivedLeads)} ({duplicatePercent}%)</span>
                          </div>
                          <div className="bg-slate-50 p-2 rounded border border-slate-100">
                            <span className="text-slate-500 block">Performing</span>
                            <span className="font-bold text-sm">{formatNum(data.bPerformingLeads)} leads</span>
                          </div>
                          <div className="bg-slate-50 p-2 rounded border border-slate-100">
                            <span className="text-slate-500 block">Cold Lead Rev</span>
                            <span className="font-bold text-sm">{formatCur(data.revBCold)}</span>
                          </div>
                          <div className="bg-slate-50 p-2 rounded border border-slate-100">
                            <span className="text-slate-500 block">Performance Rev</span>
                            <span className="font-bold text-sm">{formatCur(data.revBPerf)}</span>
                          </div>
                        </div>
                      </div>

                      {/* Lender C */}
                      <div>
                        <div className="flex justify-between items-end mb-2">
                          <h4 className="font-bold text-slate-700 flex items-center gap-2">
                            <div className="w-3 h-3 rounded-full bg-orange-400"></div> Lender C Stream (Cold)
                          </h4>
                          <div className="text-right text-sm">
                            Net: <span className="font-bold text-emerald-600">{formatCur(data.revC)}</span>
                          </div>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-2 text-xs">
                          <div className="bg-slate-50 p-2 rounded border border-slate-100">
                            <span className="text-slate-500 block">Received Leads</span>
                            <span className="font-bold text-sm">{formatNum(data.cReceivedLeads)}</span>
                          </div>
                          <div className="bg-slate-50 p-2 rounded border border-slate-100">
                            <span className="text-slate-500 block">Price Per Lead</span>
                            <span className="font-bold text-sm">{formatCur(lenderCFee)}</span>
                          </div>
                          <div className="bg-slate-50 p-2 rounded border border-slate-100">
                            <span className="text-slate-500 block">Cold Sale Rev</span>
                            <span className="font-bold text-sm">{formatCur(data.revC)}</span>
                          </div>
                        </div>
                      </div>

                    </div>

                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
